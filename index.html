<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciprianus Septem | Complexo Soberano</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            background: #001F3F;
            color: #F5F5F5;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: #C5B358;
            z-index: 9999;
            transition: width 0.1s ease;
            box-shadow: 0 0 8px #C5B358;
        }
        .menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 290px;
            height: 100vh;
            background: #00152b;
            border-right: 3px solid #C5B358;
            padding: 30px 0;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
        }
        .logo { text-align: center; padding: 0 20px 25px; border-bottom: 1px solid #BCC6CC; margin-bottom: 20px; }
        .logo h2 { color: #C5B358; font-size: 1.2rem; letter-spacing: 2px; }
        .menu a {
            display: block;
            padding: 12px 25px;
            color: #BCC6CC;
            text-decoration: none;
            border-left: 3px solid transparent;
            transition: 0.2s;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            position: relative;
        }
        .menu a:hover, .menu a.ativo { background: rgba(197, 179, 88, 0.1); color: #C5B358; border-left-color: #C5B358; }
    </style>
</head>
<body>
    <div class="progress-bar"></div>
    <div class="menu">
        <div class="logo">
            <h2>CIPRIANUS SEPTEM</h2>
        </div>
        <a class="ativo">Painel Central</a>
        <a>Diretrizes Estruturais</a>
        <a>Soberania Tecnológica</a>
        <a>Impacto Ambiental</a>
    </div>
</body>
</html>
